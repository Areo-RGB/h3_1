<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07172f" />
    <title>H03 Wochenfeedback</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">H03 TEAMÜBERSICHT</p>
          <h1>Wochenfeedback</h1>
          <p id="week-label" class="week-label">Aktuelle Woche</p>
        </div>
        <button id="refresh-button" class="refresh-button" type="button">Aktualisieren</button>
      </header>

      <div id="status" class="status" role="status">Feedback wird geladen…</div>

      <div id="dashboard" class="dashboard" hidden>
        <div id="overview-view" class="view">
          <section aria-labelledby="training-title">
            <div class="section-heading">
              <div>
                <p class="section-kicker">TRAINING</p>
                <h2 id="training-title">Absagen</h2>
              </div>
              <span id="training-total" class="total-pill"></span>
            </div>
            <div id="training-list" class="card-list"></div>
          </section>

          <section aria-labelledby="games-title">
            <div class="section-heading">
              <div>
                <p class="section-kicker">SPIELE</p>
                <h2 id="games-title">Zu- und Absagen</h2>
              </div>
            </div>
            <div id="games-list" class="card-list"></div>
          </section>

          <div class="source-footer">
            <span id="updated-at"></span>
            <span>Quelle: Google Forms</span>
          </div>
        </div>

        <section id="table-view" class="view" aria-labelledby="table-title" hidden>
          <div class="section-heading table-heading">
            <div>
              <p class="section-kicker">TRAINING</p>
              <h2 id="table-title">Absagen gesamt</h2>
            </div>
          </div>
          <div class="table-card">
            <table>
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col">Absagen</th>
                </tr>
              </thead>
              <tbody id="training-table-body"></tbody>
            </table>
          </div>
          <p class="table-note">Sortiert von den wenigsten zu den meisten Training-Absagen.</p>
        </section>

        <nav class="bottom-nav" aria-label="Dashboard-Navigation">
          <button class="nav-item active" type="button" data-view="overview" aria-selected="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="16" rx="2"></rect>
              <path d="M8 3v4M16 3v4M3 10h18"></path>
            </svg>
            <span>Woche</span>
          </button>
          <button class="nav-item" type="button" data-view="table" aria-selected="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h16M4 12h16M4 19h16"></path>
              <path d="M8 3v18M17 3v18"></path>
            </svg>
            <span>Tabelle</span>
          </button>
        </nav>
      </div>
    </main>
  </body>
</html>
