<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07172f" />
    <title>H03 Wochenfeedback</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">H03 TEAMÜBERSICHT</p>
          <h1>Wochenfeedback</h1>
          <p id="week-label" class="week-label">Aktuelle Woche</p>
        </div>
        <button id="refresh-button" class="refresh-button" type="button">Aktualisieren</button>
      </header>

      <div id="status" class="status" role="status">Feedback wird geladen…</div>

      <div id="dashboard" class="dashboard" hidden>
        <section aria-labelledby="training-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">TRAINING</p>
              <h2 id="training-title">Absagen</h2>
            </div>
            <span id="training-total" class="total-pill"></span>
          </div>
          <div id="training-list" class="card-list"></div>
        </section>

        <section aria-labelledby="games-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">SPIELE</p>
              <h2 id="games-title">Zu- und Absagen</h2>
            </div>
          </div>
          <div id="games-list" class="card-list"></div>
        </section>

        <footer>
          <span id="updated-at"></span>
          <span>Quelle: Google Forms</span>
        </footer>
      </div>
    </main>
  </body>
</html>
